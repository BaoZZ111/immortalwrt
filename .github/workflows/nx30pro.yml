name: Build ImmortalWrt 23.05 H3C NX30PRO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 安装编译依赖
        run: |
          sudo apt-get update -y
          # 仅保留 ImmortalWrt 编译必备的核心依赖，剔除引起冲突的无用包
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git libelf-dev libncurses5-dev libncursesw5-dev \
          libssl-dev python3 python3-dev python3-pip python3-setuptools python3-yaml \
          quilt rsync subversion swig unzip wget xsltproc zlib1g-dev \
          time

      - name: 拉取 ImmortalWrt 源码 (23.05 分支)
        run: |
          # 明确拉取官方 ImmortalWrt 23.05 稳定分支
          git clone -b openwrt-23.05 --single-branch --depth=1 https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: 更新并安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成定制配置
        run: |
          cd openwrt
          cat > .config << 'EOF'
          # 1. 硬件目标 (H3C NX30PRO)
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic-nx30-pro=y

          # 2. LuCI 管理界面与中文
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_LUCI_LANG_zh_Hans=y

          # 3. 系统网络加速 (ImmortalWrt 特色的 TurboAcc)
          # 包含硬件转发加速 (Flow Offloading) 和软件加速 (Shortcut-FE)
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_SHORTCUT_FE=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_BBR_CCA=y

          # 4. Passwall 插件及其运行核心 (确保刷入后即可使用)
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-passwall_Iptables_Transparent_Proxy=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ChinaDNS_NG=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Hysteria=y

          # 其他必备组件
          CONFIG_PACKAGE_luci-app-uhttpd=y
          CONFIG_PACKAGE_uhttpd=y
          EOF
          
          # 关键：让 ImmortalWrt 脚本根据以上选择自动补全所有依赖包
          make defconfig

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 开始编译固件
        run: |
          cd openwrt
          # 首次编译建议使用多线程，如果报错会通过 V=s 打印细节
          make -j$(nproc) || make -j1 V=s

      - name: 打包上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-23.05-NX30PRO
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.img.gz
            openwrt/bin/targets/mediatek/filogic/sha256sums
