name: 定制 ImmortalWrt H3C NX30PRO 固件

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 释放磁盘空间（重要！防止空间不足）
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装编译依赖（优化版）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential ccache ecj fastjar file g++ gawk \
            gettext git git-core gitk libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 python3-dev \
            python3-pip python3-setuptools python3-yaml quilt rsync \
            subversion swig unzip wget xsltproc zlib1g-dev time \
            python3-distutils-extra || true   # 避免严格失败

      - name: 拉取 ImmortalWrt 官方主仓库
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt

      - name: 添加 Passwall 插件源
        run: |
          cd openwrt
          echo "src-git passwall https://github.com/Openwrt-Passwall/packages.git" >> feeds.conf.default

      - name: 更新 feeds 并安装
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成 .config 配置
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic-nx30-pro=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y

          CONFIG_PACKAGE_luci-app-flowoffloading=y

          CONFIG_PACKAGE_luci-app-passwall=y
          EOF

      - name: defconfig 并下载依赖
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc) || true

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s   # 如果并行失败，降为单线程重试

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-H3C-NX30PRO-固件
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.img
            openwrt/bin/targets/mediatek/filogic/*.gz
            openwrt/bin/targets/mediatek/filogic/sha256sums
          retention-days: 7
