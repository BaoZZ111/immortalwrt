name: Build ImmortalWrt 23.05 H3C NX30PRO

on:
  workflow_dispatch:

# 消除 GitHub Actions 的 Node.js 20 弃用黄字警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 彻底释放磁盘空间 (防止爆盘 Error 2)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev libpython3-dev python3-jinja2 python3-pyelftools \
          python3-setuptools qemu-utils rsync unzip zlib1g-dev swig tar file wget zstd

      - name: 拉取源码并添加 Passwall 完整组件
        run: |
          git clone -b openwrt-23.05 --single-branch --depth=1 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          
          # 【关键修正】：Passwall 现在需要同时添加 packages(核心依赖) 和 luci(界面) 两个仓库
          echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main" >> feeds.conf.default
          echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main" >> feeds.conf.default

      - name: 更新并安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成定制配置
        run: |
          cd openwrt
          cat > .config << 'EOF'
          # 1. 硬件目标 (H3C NX30PRO)
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic-nx30-pro=y

          # 2. 基础界面与中文
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_LUCI_LANG_zh_Hans=y

          # 3. 解决冲突：移除标准 dnsmasq，安装 full 版 (Passwall 必须依赖)
          # CONFIG_PACKAGE_dnsmasq is not set
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y

          # 4. 网络加速 (TurboAcc)
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_SHORTCUT_FE=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_BBR_CCA=y

          # 5. Passwall 及其核心组件
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-passwall_Iptables_Transparent_Proxy=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ChinaDNS_NG=y
          
          # 6. 其他常用工具
          CONFIG_PACKAGE_luci-app-uhttpd=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_htop=y
          EOF
          
          # 刷新配置并让系统自动补全深层依赖树
          make defconfig

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: 开始编译固件
        run: |
          cd openwrt
          # 先尝试多线程编译，如果报错退回单线程并打印详细错误日志
          make -j$(nproc) || make -j1 V=s

      - name: 打包上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-NX30PRO-Firmware
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.img.gz
            openwrt/bin/targets/mediatek/filogic/sha256sums
