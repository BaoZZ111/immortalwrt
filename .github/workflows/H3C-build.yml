name: 定制 ImmortalWrt H3C NX30PRO 固件（官方主仓库 + LuCI + Passwall + 系统网络加速）

on:
  workflow_dispatch:  # 手动触发构建

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git git-core gitk gitweb libelf-dev libncurses5-dev libncursesw5-dev \
          libssl-dev python3 python3-dev python3-pip python3-setuptools python3-yaml \
          python3-distutils quilt rsync subversion swig unzip wget xsltproc zlib1g-dev \
          time

      - name: 拉取 ImmortalWrt 官方主仓库（master 分支）
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt

      - name: 添加 Passwall 插件源
        run: |
          cd openwrt
          echo "src-git passwall https://github.com/Openwrt-Passwall/packages.git" >> feeds.conf.default

      - name: 更新并安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成定制配置（H3C NX30PRO + LuCI + Passwall + 网络加速）
        run: |
          cat > openwrt/.config << 'EOF'
          # Target 系统
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic-nx30-pro=y

          # LuCI 网页管理界面（必须）
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y

          # 系统网络加速（Flow Offloading 硬件/软件加速）
          CONFIG_PACKAGE_luci-app-flowoffloading=y

          # Passwall 插件（完整代理管理）
          CONFIG_PACKAGE_luci-app-passwall=y

          # 常用 Passwall 额外组件（按需开启，取消注释即可）
          # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ChinaDNS_NG=y
          # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Hysteria=y
          # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Geodata=y
          # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_GO=y

          # 其他常用基础包（推荐保留）
          CONFIG_PACKAGE_luci-app-uhttpd=y
          CONFIG_PACKAGE_uhttpd=y
          EOF

      - name: 应用配置并解决依赖
        run: |
          cd openwrt
          make defconfig

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j$(nproc) || true

      - name: 开始编译固件（可能需要 60~120 分钟）
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 打包上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-H3C-NX30PRO-固件
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.img
            openwrt/bin/targets/mediatek/filogic/*.gz
            openwrt/bin/targets/mediatek/filogic/sha256sums
          retention-days: 7
