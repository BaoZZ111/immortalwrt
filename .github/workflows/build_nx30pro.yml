name: Build-NX30Pro

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install deps
    run: sudo apt update && sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl

  - name: Clone source
    run: |
      git clone https://github.com/immortalwrt/immortalwrt.git
      cd immortalwrt
      git checkout openwrt-23.05

  - name: Add Passwall
    run: |
      cd immortalwrt
      echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall" >> feeds.conf.default
      ./scripts/feeds update -a
      ./scripts/feeds install -a

  - name: Generate config
    run: |
      cd immortalwrt
      rm -f .config
      echo "CONFIG_TARGET_mediatek=y" >> .config
      echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
      echo "CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_nx30pro=y" >> .config

      echo "CONFIG_PACKAGE_luci=y" >> .config
      echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
      echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config

      echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
      echo "CONFIG_PACKAGE_kmod-inet-diag=y" >> .config

      echo "CONFIG_PACKAGE_ppp=y" >> .config
      echo "CONFIG_PACKAGE_ppp-mod-pppoe=y" >> .config
      echo "CONFIG_PACKAGE_kmod-pppoe=y" >> .config

      echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config

      make defconfig

  - name: Download
    run: |
      cd immortalwrt
      make download -j$(nproc)

  - name: Compile
    run: |
      cd immortalwrt
      make -j$(nproc) || make -j1 V=s

  - name: Upload
    uses: actions/upload-artifact@v4
    with:
      name: firmware-nx30pro
      path: immortalwrt/bin/targets/
```
